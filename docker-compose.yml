services:
  postgres:
    image: postgres:16
    container_name: hr-intelligence-postgres
    environment:
      POSTGRES_USER: hr_user
      POSTGRES_PASSWORD: hr_password
      POSTGRES_DB: hr_intelligence_platform
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hr_user -d hr_intelligence_platform"]
      interval: 5s
      timeout: 5s
      retries: 5
  api:
    build: .
    container_name: hr-intelligence-api
    ports:
      - "8000:8000"
    env_file:
      - .env.docker
    depends_on:
      postgres:
        condition: service_healthy
volumes:
  postgres_data:
